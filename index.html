<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chase Greenberg | Film Portfolio</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .hero { visibility: hidden; }
  </style>
</head>
<body>

  <!-- Countdown overlay - in HTML so it appears instantly -->
  <div class="countdown-overlay" id="countdown-overlay">
    <div class="countdown-number" id="countdown-number"></div>
    <div class="countdown-circle" id="countdown-circle"></div>
  </div>

  <nav>
    <div class="nav-inner">
      <a href="index.html" class="logo">Chase Greenberg</a>
      <div class="hamburger" onclick="document.querySelector('.nav-links').classList.toggle('open')">
        <span></span><span></span><span></span>
      </div>
      <div class="nav-links">
        <a href="index.html" class="active">Home</a>
        <a href="about.html">About Me</a>
        <a href="resume.html">Resume</a>
        <a href="film-statement.html">Film Statement</a>
        <a href="films.html">Films</a>
        <a href="quotes.html">Quotes</a>
        <a href="interviews.html">Interviews</a>
        <a href="discussion.html">Forum</a>
        <a href="https://www.linkedin.com/in/chase-greenberg-495a88257/" target="_blank">LinkedIn</a>
      </div>
    </div>
  </nav>

  <section class="hero">
    <div class="poster-frame">
      <img src="images/hit-me-poster.png" alt="Hit Me - Film Poster">
    </div>
    <h1>Chase Greenberg</h1>
    <p class="tagline">Visual Architect &bull; Storyteller &bull; Filmmaker</p>
    <a href="about.html" class="enter-btn">Enter the Portfolio</a>
  </section>

  <footer>
    <p>&copy; 2026 Chase Greenberg &mdash; ENG 256: Crafting the Dramatic Film &mdash; Dr. Bradley Hammer</p>
  </footer>

  <script>
    // Countdown runs inline - no waiting for external scripts
    (function() {
      var overlay = document.getElementById('countdown-overlay');
      var numEl = document.getElementById('countdown-number');
      var circle = document.getElementById('countdown-circle');
      var hero = document.querySelector('.hero');

      var sequence = [
        { text: '3', delay: 450 },
        { text: '2', delay: 450 },
        { text: '1', delay: 450 },
        { text: 'ACTION', delay: 1000 }
      ];
      var idx = 0;

      function showNext() {
        if (idx >= sequence.length) {
          overlay.classList.add('countdown-fade-out');
          hero.style.visibility = 'visible';
          hero.classList.add('hero-reveal');
          setTimeout(function() { overlay.remove(); }, 600);
          return;
        }

        var step = sequence[idx];
        numEl.textContent = step.text;
        numEl.classList.remove('countdown-pop');
        void numEl.offsetWidth;
        numEl.classList.add('countdown-pop');

        if (step.text === 'ACTION') {
          numEl.classList.add('action-text');
        } else {
          numEl.classList.remove('action-text');
        }

        circle.classList.remove('countdown-circle-animate');
        void circle.offsetWidth;
        circle.classList.add('countdown-circle-animate');

        idx++;
        setTimeout(showNext, step.delay);
      }

      showNext();
    })();
  </script>
  <script src="animations.js"></script>
</body>
</html>
