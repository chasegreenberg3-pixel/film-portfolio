  <link rel="stylesheet" href="style.css">
  <style>
    .interview-link {
      display: block;
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(201, 168, 76, 0.2);
      border-radius: 4px;
      margin-bottom: 15px;
    }
    .interview-link img {
      width: 100%;
      display: block;
      transition: transform 0.4s ease, filter 0.4s ease;
    }
    .interview-link:hover img {
      transform: scale(1.03);
      filter: brightness(0.7);
    }
    .interview-link .play-btn {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 70px;
      height: 70px;
      background: rgba(201, 168, 76, 0.9);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    .interview-link:hover .play-btn {
      opacity: 1;
    }
    .play-btn::after {
      content: '';
      display: block;
      width: 0;
      height: 0;
      border-style: solid;
      border-width: 12px 0 12px 22px;
      border-color: transparent transparent transparent #0d0d0d;
      margin-left: 4px;
    }
  </style>
</head>
